networks:
  bgp_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

services:
  router2:
    image: frrouting/frr:latest
    platform: linux/amd64
    container_name: router2
    hostname: router2
    privileged: true
    networks:
      bgp_net:
        ipv4_address: 172.20.0.2
    volumes:
      - ./configs/router2:/etc/frr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN

  router3:
    image: frrouting/frr:latest
    platform: linux/amd64
    container_name: router3
    hostname: router3
    privileged: true
    networks:
      bgp_net:
        ipv4_address: 172.20.0.3
    volumes:
      - ./configs/router3:/etc/frr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
