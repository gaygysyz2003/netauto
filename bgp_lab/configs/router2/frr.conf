frr version 8.0
frr defaults traditional
hostname router2
log syslog informational
no ipv6 forwarding

router bgp 65002
 bgp router-id 172.20.0.2
 neighbor 172.20.0.4 remote-as 65001
 neighbor 172.20.0.3 remote-as 65003
 !
 address-family ipv4 unicast
  network 192.168.2.0/24
  neighbor 172.20.0.4 activate
  neighbor 172.20.0.3 activate
 exit-address-family

ip route 192.168.2.0/24 blackhole
