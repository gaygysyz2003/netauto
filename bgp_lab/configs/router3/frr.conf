frr version 8.0
frr defaults traditional
hostname router3
log syslog informational
no ipv6 forwarding

router bgp 65003
 bgp router-id 172.20.0.3
 no bgp ebgp-requires-policy
 neighbor 172.20.0.4 remote-as 65001
 neighbor 172.20.0.2 remote-as 65002
 !
 address-family ipv4 unicast
  network 192.168.3.0/24
  neighbor 172.20.0.4 activate
  neighbor 172.20.0.2 activate
 exit-address-family

ip route 192.168.3.0/24 blackhole
